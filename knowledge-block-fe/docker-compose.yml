version: "3.9"

services:
  app:
    container_name: knowledge-block-fe

    build:
      context: .
      dockerfile: Dockerfile
      target: development

    ports:
      - "3000:3000"

    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

    env_file:
      - .env

    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"

    # command: npm run dev

    restart: unless-stopped
