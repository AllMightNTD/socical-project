services:
  app-dev:
    container_name: nestjs-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - '3003:3000'
      - '9229:9229'
    volumes:
      - .:/app
      - /app/node_modules # Giữ lại node_modules trong container để tránh xung đột với máy host
      - ~/.npm:/root/.npm # Cache npm để cài đặt lib nhanh hơn nếu có rebuild
    env_file:
      - .env
    environment:
      - NODE_ENV=development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: mysql-db
    # Loại bỏ native_password nếu không thực sự cần thiết cho client cũ
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Ho_Chi_Minh # Đổi về VN cho dễ quản lý log
    ports:
      - '13306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME}", "-p${DB_PASSWORD}"]
      interval: 5s # Giảm interval để app-dev khởi động nhanh hơn
      timeout: 5s
      retries: 10
    networks:
      - app_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app_network
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD}
      - HTTP_USER=admin # Thêm user/pass cho giao diện quản lý nếu cần
      - HTTP_PASSWORD=admin
    ports:
      - '8081:8081'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data: